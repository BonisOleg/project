{% extends 'base.html' %}

{% block content %}
<div class="container" style="padding:var(--sp-8) 0;max-width:720px">
  <h1 class="section__title">{{ page.title }}</h1>
  <div style="margin-top:var(--sp-6);display:grid;gap:var(--sp-4)">
    {% for item in faq_items %}
    <details style="padding:var(--sp-4);background:var(--c-surface);border-radius:var(--r-md);border:1px solid var(--c-border)">
      <summary style="font-weight:600;cursor:pointer">{{ item.question }}</summary>
      <p style="margin-top:var(--sp-3);color:var(--c-text-secondary)">{{ item.answer|linebreaks }}</p>
    </details>
    {% empty %}
    <p>FAQ скоро зʼявиться.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}

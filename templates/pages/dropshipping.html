{% extends 'base.html' %}

{% block content %}
<div class="container" style="padding:var(--sp-8) 0;max-width:720px">
  <h1 class="section__title">{{ page.title }}</h1>
  <div style="margin-top:var(--sp-4)">{{ page.content|linebreaks }}</div>
  <form method="post" style="margin-top:var(--sp-6);display:grid;gap:var(--sp-4)">
    {% csrf_token %}
    {% for field in form %}
    <div class="field"><label class="field__label">{{ field.label }}</label>{{ field }}</div>
    {% endfor %}
    <button type="submit" class="btn btn--primary">Надіслати заявку</button>
  </form>
</div>
{% endblock %}

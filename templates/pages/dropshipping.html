{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pages/content.css' %}">
{% endblock %}

{% block content %}
<div class="container content-page">
  {% include 'partials/breadcrumbs.html' %}

  <header class="page-header">
    <h1 class="page-title">{{ page.title }}</h1>
  </header>

  <div class="content-page__body">{{ page.content|linebreaks }}</div>

  <form method="post" class="content-form">
    {% csrf_token %}
    {% for field in form %}
    <div class="field">
      <label class="field__label" for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn--primary btn--sm">Надіслати заявку</button>
  </form>
</div>
{% endblock %}

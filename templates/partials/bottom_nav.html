{% with path=request.path %}
<nav class="bottom-nav" aria-label="Швидка навігація">
  <a href="{% url 'core:home' %}" class="bottom-nav__item{% if path == '/' %} is-active{% endif %}">
    <span class="bottom-nav__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V9.5z"/></svg>
    </span>
    <span>Головна</span>
  </a>

  <a href="{% url 'catalog:list' %}" class="bottom-nav__item{% if path|slice:':9' == '/catalog/' %} is-active{% endif %}">
    <span class="bottom-nav__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </span>
    <span>Каталог</span>
  </a>

  <a href="{% url 'cart:detail' %}" class="bottom-nav__item{% if path|slice:':6' == '/cart/' %} is-active{% endif %}">
    <span class="bottom-nav__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="bottom-nav__badge" id="cart-count-bottom">{% if cart_count %}{{ cart_count }}{% endif %}</span>
    </span>
    <span>Кошик</span>
  </a>

  <a href="{% url 'accounts:wishlist' %}" class="bottom-nav__item{% if '/accounts/wishlist' in path %} is-active{% endif %}">
    <span class="bottom-nav__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="bottom-nav__badge" id="wishlist-count-bottom">{% if wishlist_count %}{{ wishlist_count }}{% endif %}</span>
    </span>
    <span>Обране</span>
  </a>

  {% if user.is_authenticated %}
  <a href="{% url 'accounts:cabinet' %}" class="bottom-nav__item{% if '/accounts/cabinet' in path or '/accounts/profile' in path %} is-active{% endif %}">
    <span class="bottom-nav__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </span>
    <span>Кабінет</span>
  </a>
  {% else %}
  <a href="{% url 'accounts:login' %}" class="bottom-nav__item{% if '/accounts/login' in path or '/accounts/register' in path %} is-active{% endif %}">
    <span class="bottom-nav__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </span>
    <span>Вхід</span>
  </a>
  {% endif %}
</nav>
{% endwith %}

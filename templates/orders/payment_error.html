{% extends 'base.html' %}

{% block content %}
<div class="container" style="padding:var(--sp-10) 0;text-align:center;max-width:560px">
  <h1 class="section__title">Помилка оплати</h1>
  <p style="margin-top:var(--sp-4)">Замовлення {{ order.order_number }} збережено. Статус: очікує оплати.</p>
  <a href="{% url 'orders:retry_payment' order.order_number %}" class="btn btn--primary" style="margin-top:var(--sp-6)">Спробувати знову</a>
  <p style="margin-top:var(--sp-4);font-size:var(--fs-sm)">Питання? {{ site_settings.phone }} · {{ site_settings.email }}</p>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="container" style="padding:var(--sp-10) 0;text-align:center;max-width:560px">
  <h1 class="section__title">Дякуємо за замовлення!</h1>
  <p style="margin-top:var(--sp-4);color:var(--c-text-secondary)">Номер замовлення: <strong>{{ order.order_number }}</strong></p>
  <p style="margin-top:var(--sp-3)">Ми обробимо замовлення та надішлемо підтвердження на {{ order.email }}.</p>
  <a href="{% url 'catalog:list' %}" class="btn btn--primary" style="margin-top:var(--sp-6)">Продовжити покупки</a>
</div>
{% endblock %}

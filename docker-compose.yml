services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oyra}
      POSTGRES_USER: ${POSTGRES_USER:-oyra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oyra}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-oyra}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-oyra}
      DJANGO_SETTINGS_MODULE: config.settings.docker
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
